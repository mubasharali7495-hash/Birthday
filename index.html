<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Champion!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ff6b81;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            text-align: center;
            cursor: pointer;
        }
        h1 {
            font-size: 2rem;
            margin: 20px 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }
        #music-btn {
            background-color: #fff;
            color: #ff6b81;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .slider-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 450px;
            border: 8px solid white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background-color: #000;
        }
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slide.active {
            opacity: 1;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .wish-text {
            font-size: 1.2rem;
            margin: 15px 0;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>HAPPY BIRTHDAY CHAMPION! 🎉👑</h1>
    
    <button id="music-btn" onclick="toggleMusic(event)">🎵 Play Birthday Music</button>

    <!-- Photo Slideshow -->
    <div class="slider-container">
        <div class="slide active">
            <img src="IMG-20260717-WA0006.jpg" alt="Photo 1">
        </div>
        <div class="slide">
            <img src="IMG_20260119_110743_720.jpg" alt="Photo 2">
        </div>
        <div class="slide">
            <img src="IMG-20260717-WA0005.jpg" alt="Photo 3">
        </div>
        <div class="slide">
            <img src="IMG-20260716-WA0007.jpg" alt="Photo 4">
        </div>
        <div class="slide">
            <img src="IMG-20260716-WA0008.jpg" alt="Photo 5">
        </div>
        <div class="slide">
            <img src="IMG-20260706-WA0022.jpg" alt="Photo 6">
        </div>
    </div>

    <p class="wish-text">We love you so much! ❤️</p>

    <!-- Real Happy Birthday Song -->
    <audio id="bg-music" loop preload="auto">
        <source src="https://vincents-files.pages.dev/happy-birthday.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        let slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 3000);

        let music = document.getElementById('bg-music');
        let btn = document.getElementById('music-btn');
        let hasPlayed = false;

        function toggleMusic(event) {
            if (event) event.stopPropagation();
            if (music.paused) {
                playAudio();
            } else {
                pauseAudio();
            }
        }

        function playAudio() {
            music.play().then(() => {
                btn.innerHTML = "⏸️ Pause Music";
                hasPlayed = true;
            }).catch(err => {
                console.log("Audio play failed:", err);
            });
        }

        function pauseAudio() {
            music.pause();
            btn.innerHTML = "🎵 Play Birthday Music";
        }

        document.body.addEventListener('click', () => {
            if (!hasPlayed) {
                playAudio();
            }
        });
    </script>
</body>
</html>
