<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #ff758c, #ff7eb3);
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow: hidden;
            height: 100vh;
        }
        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-top: 50px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        .instruction {
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.15);
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 10px;
        }
        /* Cake styling */
        .cake-container {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
        }
        .cake {
            width: 160px;
            height: 100px;
            background: #f3a683;
            border-radius: 15px 15px 0 0;
            position: relative;
            box-shadow: inset 0 10px #f19066, 0 10px 20px rgba(0,0,0,0.1);
        }
        .cream {
            width: 160px;
            height: 25px;
            background: #fff;
            position: absolute;
            top: 0;
            border-radius: 15px 15px 0 0;
        }
        .candle {
            width: 12px;
            height: 45px;
            background: #78e08f;
            position: absolute;
            top: -45px;
            left: 74px;
            border-radius: 5px;
        }
        .flame {
            width: 16px;
            height: 22px;
            background: #ff9f1a;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -22px;
            left: -2px;
            box-shadow: 0 0 10px #ff9f1a;
            animation: flicker 0.1s infinite alternate;
        }
        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }
        /* Balloons */
        .balloon {
            width: 55px;
            height: 70px;
            background: red;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: absolute;
            bottom: -100px;
            animation: floatUp 7s infinite linear;
        }
        @keyframes floatUp {
            0% { bottom: -100px; transform: translateX(0); opacity: 1; }
            100% { bottom: 105vh; transform: translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 id="title">HAPPY BIRTHDAY CHAMPION! 🎉</h1>
    <div class="instruction" id="hint">Tap the candle to blow it out! 🎂</div>

    <!-- Cake -->
    <div class="cake-container" onclick="blowCandle()">
        <div class="candle">
            <div class="flame" id="flame"></div>
        </div>
        <div class="cake">
            <div class="cream"></div>
        </div>
    </div>

    <!-- Audio for fun -->
    <audio id="birthday-song" src="https://assets.mixkit.co/active_storage/sfx/143/143-200.wav"></audio>

    <script>
        // Balloons Generator
        function createBalloon() {
            const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6', '#ff6b81'];
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.style.left = Math.random() * 90 + 'vw';
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 7000);
        }
        setInterval(createBalloon, 600);

        function blowCandle() {
            // Hide flame
            document.getElementById('flame').style.display = 'none';
            // Change texts
            document.getElementById('title').innerText = "YAYYY! 🎉🎂🥳";
            document.getElementById('hint').innerText = "We love you so much! ❤️";
            
            // Play a little sound effect
            const audio = document.getElementById('birthday-song');
            audio.play().catch(e => console.log("Audio play blocked by browser"));

            // Show a sweet popup
            setTimeout(() => {
                alert("Happy Birthday to the coolest 7-year-old in the world! 🌟✨");
            }, 300);
        }
    </script>
</body>
</html>
